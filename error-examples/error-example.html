<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debugging Task: The Broken Calculator</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
        }

        button {
            padding: 10px 20px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            background-color: #004494;
        }

        #result-display {
            margin-top: 20px;
            font-weight: bold;
            font-size: 18px;
            color: #333;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Shopping Cart</h2>
        <p>Base Price: $50.00</p>
        <p>Tax Rate: 20%</p>
        <p id="result-display">Total will appear here...</p>
    </div>

    <script>
        function calculateTotal(price, taxRate {
            const taxAmount = price * taxRate;
            const finalTotal = price + taxAmount;
            return finalTotal;
        }
    </script>

    <script>
        function showTotal() {
            const basePrice = 50;
            const tax = 0.15;

            const total = calculateTotal(basePrice, tax);

            document.getElementById('result-display')
                .innerText = "Final Total: $" + total.toFixed(2);
        }

        showTotal();
    </script>

</body>

</html>
